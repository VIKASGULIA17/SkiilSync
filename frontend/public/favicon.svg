<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <style>
    @keyframes spin-clockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin-counter {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    @keyframes pulse-core {
      0%, 100% { transform: scale(1); opacity: 0.85; filter: drop-shadow(0 0 10px rgba(62, 207, 142, 0.4)); }
      50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 25px rgba(62, 207, 142, 0.8)); }
    }
    .orbit-1 {
      transform-origin: 256px 256px;
      animation: spin-clockwise 14s linear infinite;
    }
    .orbit-2 {
      transform-origin: 256px 256px;
      animation: spin-counter 10s linear infinite;
    }
    .center-glow {
      transform-origin: 256px 256px;
      animation: pulse-core 3s ease-in-out infinite;
    }
  </style>
  <circle cx="256" cy="256" r="220" stroke="#2e2e2e" stroke-width="8" stroke-dasharray="16 12" opacity="0.3" />
  <path class="orbit-1" d="M 256,76 A 180,180 0 0,1 436,256 A 180,180 0 0,1 256,436" stroke="url(#green-grad-1)" stroke-width="24" stroke-linecap="round" />
  <path class="orbit-2" d="M 256,436 A 180,180 0 0,1 76,256 A 180,180 0 0,1 256,76" stroke="url(#green-grad-2)" stroke-width="24" stroke-linecap="round" />
  <circle class="center-glow" cx="256" cy="256" r="48" fill="#3ecf8e" />
  <circle class="center-glow" cx="256" cy="256" r="20" fill="#ffffff" />
  <defs>
    <linearGradient id="green-grad-1" x1="256" y1="76" x2="436" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3ecf8e" />
      <stop offset="100%" stop-color="#04b275" />
    </linearGradient>
    <linearGradient id="green-grad-2" x1="256" y1="436" x2="76" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2e2e2e" />
      <stop offset="100%" stop-color="#3ecf8e" />
    </linearGradient>
  </defs>
</svg>